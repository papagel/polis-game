name: tests

# The site deploys straight from main to GitHub Pages, so run the suite on every
# push and PR to catch a broken index.html before it goes live.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
